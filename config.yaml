config_version: 8
log_level: info
token_usage:
  enabled: false
models:
- name: qwen3.6-plus
  display_name: Qwen3.6-Plus
  use: langchain_openai:ChatOpenAI
  model: qwen3.6-plus
  api_key: $DASHSCOPE_API_KEY
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  request_timeout: 600.0
  max_retries: 2
  max_tokens: 8192
  temperature: 0.7
  supports_thinking: true
  supports_vision: true
  when_thinking_enabled:
    extra_body:
      thinking:
        type: enabled
  when_thinking_disabled:
    extra_body:
      thinking:
        type: disabled
tool_groups:
- name: web
- name: file:read
- name: file:write
- name: bash
- name: secops
tools:
- name: web_search
  group: web
  use: deerflow.community.ddg_search.tools:web_search_tool
  max_results: 5
- name: web_fetch
  group: web
  use: deerflow.community.jina_ai.tools:web_fetch_tool
  timeout: 10
- name: image_search
  group: web
  use: deerflow.community.image_search.tools:image_search_tool
  max_results: 5
- name: ls
  group: file:read
  use: deerflow.sandbox.tools:ls_tool
- name: read_file
  group: file:read
  use: deerflow.sandbox.tools:read_file_tool
- name: glob
  group: file:read
  use: deerflow.sandbox.tools:glob_tool
  max_results: 200
- name: grep
  group: file:read
  use: deerflow.sandbox.tools:grep_tool
  max_results: 100
- name: write_file
  group: file:write
  use: deerflow.sandbox.tools:write_file_tool
- name: str_replace
  group: file:write
  use: deerflow.sandbox.tools:str_replace_tool
- name: bash
  group: bash
  use: deerflow.sandbox.tools:bash_tool
- name: get_alert_workspace_context
  group: secops
  use: secops_tools.tools:get_alert_workspace_context_tool
- name: update_alert_status
  group: secops
  use: secops_tools.tools:update_alert_status_tool
- name: get_mock_auth_user_context
  group: secops
  use: secops_tools.tools:get_mock_auth_user_context
- name: kick_mock_auth_user_sessions
  group: secops
  use: secops_tools.tools:kick_mock_auth_user_sessions
- name: disable_mock_auth_user
  group: secops
  use: secops_tools.tools:disable_mock_auth_user
- name: create_mock_ticket
  group: secops
  use: secops_tools.tools:create_mock_ticket_tool
- name: get_mock_ticket_external_status
  group: secops
  use: secops_tools.tools:get_mock_ticket_external_status_tool
tool_search:
  enabled: false
uploads:
  pdf_converter: auto
  auto_convert_documents: false
sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider
  allow_host_bash: true
  bash_output_max_chars: 20000
  read_file_output_max_chars: 50000
  ls_output_max_chars: 20000
skills:
  path: ../skills
  container_path: /mnt/skills
title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null
summarization:
  enabled: true
  model_name: null
  trigger:
  - type: tokens
    value: 15564
  keep:
    type: messages
    value: 10
  trim_tokens_to_summarize: 15564
  summary_prompt: null
  preserve_recent_skill_count: 5
  preserve_recent_skill_tokens: 25000
  preserve_recent_skill_tokens_per_skill: 5000
  skill_file_read_tool_names:
  - read_file
  - read
  - view
  - cat
memory:
  enabled: true
  storage_path: memory.json
  debounce_seconds: 30
  model_name: null
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000
skill_evolution:
  enabled: true
  moderation_model_name: null
checkpointer:
  type: sqlite
  connection_string: checkpoints.db
agents_api:
  enabled: true
database:
  backend: sqlite
  sqlite_dir: .deer-flow/data
run_events:
  backend: memory
  max_trace_content: 10240
  track_token_usage: true
